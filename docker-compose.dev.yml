name: that_limit

services:
  redis:
    image: redis/redis-stack:latest
    container_name: that_limit.redis.dev
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - ./docker-volumes/dev/redis/data:/data
    environment:
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
