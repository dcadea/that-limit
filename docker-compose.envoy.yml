name: that-limit-envoy

services:
  server:
    container_name: that-limit-envoy.server.dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        provider: envoy
    ports:
      - "50051:50051"
    environment:
      REDIS_HOST: that-limit-envoy.redis.dev
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis/redis-stack:latest
    container_name: that-limit-envoy.redis.dev
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - ./docker-volumes/dev/envoy/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
