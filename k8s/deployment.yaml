apiVersion: apps/v1
kind: Deployment
metadata:
  name: that-limit
  labels:
    app: that-limit
spec:
  replicas: 5
  selector:
    matchLabels:
      app: that-limit
  template:
    metadata:
      labels:
        app: that-limit
    spec:
      containers:
      - name: that-limit
        image: that-limit:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
