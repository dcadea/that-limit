apiVersion: v1
kind: Service
metadata:
  name: envoy-lb
spec:
  type: LoadBalancer
  selector:
    app: envoy
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.33-latest
        args:
        - "-c"
        - "/etc/envoy/envoy.yaml"

        ports:
        - containerPort: 8080

        volumeMounts:
        - name: config
          mountPath: /etc/envoy

      volumes:
      - name: config
        configMap:
          name: envoy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
data:
  envoy.yaml: |
    static_resources:

      listeners:
      - name: http_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080

        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress

              route_config:
                name: routes
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: upstream_service
                      rate_limits:
                      - actions:
                        - request_headers:
                            header_name: x-user-id
                            descriptor_key: user_id
                        - remote_address: {}

              http_filters:
              - name: envoy.filters.http.ratelimit
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
                  domain: that-limit
                  failure_mode_deny: false
                  rate_limit_service:
                    grpc_service:
                      envoy_grpc:
                        cluster_name: rate_limit_service
                    transport_api_version: V3

              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: upstream_service
        connect_timeout: 5s
        type: logical_dns
        lb_policy: round_robin
        load_assignment:
          cluster_name: upstream_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: my-api
                    port_value: 80

      - name: rate_limit_service
        connect_timeout: 2s
        type: logical_dns
        lb_policy: round_robin
        http2_protocol_options: {}
        load_assignment:
          cluster_name: rate_limit_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: that-limit-envoy
                    port_value: 50051
