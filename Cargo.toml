[package]
name = "that-limit"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.29"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "fs"] }
tower = "0.5.2"
serde = { version= "1.0.228", features= ["derive"]}
axum = "0.8.8"
dashmap = "6.1.0"
serde_json = "1.0.148"
redis = { version = "1.0.2", features = ["connection-manager", "tokio-comp"] }
